services:
  livekit:
    image: livekit/livekit-server
    command: --dev --bind 0.0.0.0 --redis-host redis:6379
    ports:
      - 7880:7880
    depends_on:
      redis:
        condition: service_started
  agent:
    build:
      context: ./backend
      dockerfile: Livekit.Dockerfile
    depends_on:
      livekit:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - $HOME/.config/gcloud/application_default_credentials.json:/app/.config/gcloud/application_default_credentials.json:ro
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    env_file:
      - ./frontend/.env
    depends_on:
      - livekit
  redis:
    image: redis
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  weaviate:
    command:
    - --host
    - 0.0.0.0
    - --port
    - '8081'
    - --scheme
    - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.33.0
    ports:
    - 8081:8081
    - 50051:50051
    volumes:
    - weaviate_data:/var/lib/weaviate
    - ~/.config/gcloud:/root/.config/gcloud:ro
    - ./backups:/tmp/backups
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      CLUSTER_HOSTNAME: 'node1'
      ENABLE_MODULES: 'text2vec-google,backup-filesystem'
      USE_GOOGLE_AUTH: 'true'
      ASYNC_INDEXING: 'true'
      BACKUP_FILESYSTEM_PATH: '/tmp/backups'
volumes:
  redis_data:
  weaviate_data:
  postgres_data:
